name: Build Binaries

on:
  push:
    tags:
      - 'v*'
      - 'beta*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build AMD64
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -extldflags=-static" -o s3tele-amd64 ./cmd/s3tele

      - name: Build ARM64
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -extldflags=-static" -o s3tele-arm64 ./cmd/s3tele

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            s3tele-amd64
            s3tele-arm64
          generate_release_notes: true